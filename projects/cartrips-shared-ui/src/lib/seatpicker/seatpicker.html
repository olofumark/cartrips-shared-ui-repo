@if(vehicleConfig.vehicletype){
    <div class="d-flex justify-content-between pb-3 pb-sm-4 mb-xl-2">

                    <i class="fi-user fs-base me-1"></i>

                  }@else{
                    <i class="fi-close fs-base me-1 text-danger"></i>
                    <del>1</del>
                  }
                }

            <input type="checkbox" class="btn-check  " id="{{vehicleConfig.cc}}-seat-{{seat.seatnumber}}" name="vehicletype"

            <label class="nav-link  " for="{{vehicleConfig.cc}}-seat-{{seat.seatnumber}}">
              @if(bookingMode){
                @if(selectedAtIndex(i+1)){
                  <!-- style="font-size: 24px !important; font-weight: bold !important;" -->
                  <i class="fi-check fs-base me-1 text-success" ></i>
                  {{seat.seatnumber}}
                }@else{
                  <!-- <i class="fi-user fs-base me-1"></i> -->
                  @if( isAvailableAtIndex(i+1) ){
                    <i class="fi-user fs-base me-1"></i>
                    {{seat.seatnumber}}
                  }@else{
                    <i class="fi-close fs-base me-1 text-danger"></i>
                    <del>{{seat.seatnumber}}</del>
                  }
  
                }
                
                
              }@else{
                @if( isAvailableAtIndex(i+1) ){
                  <i class="fi-user fs-base me-1"></i>
                  {{seat.seatnumber}}
                }@else{
                  <i class="fi-close fs-base me-1 text-danger"></i>
                  <del>{{seat.seatnumber}}</del>
                }
              }
            </label>
          </div>
    
          @if((i+1) % vehicleConfig.seatsperrow == 0){
            <div class="w-100"></div>
          }
    
        }
      </div>
    </div>
  }
